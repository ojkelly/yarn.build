on: [pull_request]

name: Build and Test

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "yarn"

      - name: Check dependencies
        run: |
          yarn install --immutable --immutable-cache

      - name: Lint
        run: |
          yarn lint

      - name: Format check
        run: |
          yarn fmt:check

      - name: Build
        run: |
          yarn build -r --all

      - name: Test
        run: |
          yarn test -r --all

      - uses: actions/upload-artifact@v4
        with:
          name: plugins-all
          path: .yarn/plugins/@yarn.build
